name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore parity runner
        run: dotnet restore ./tests/MemShack.ParityRunner/MemShack.ParityRunner.csproj

      - name: Restore test project
        run: dotnet restore ./tests/MemShack.Tests/MemShack.Tests.csproj

      - name: Build parity runner
        run: dotnet build ./tests/MemShack.ParityRunner/MemShack.ParityRunner.csproj --configuration Release --no-restore

      - name: Test project
        run: dotnet test ./tests/MemShack.Tests/MemShack.Tests.csproj --configuration Release --no-restore

  pack-tool:
    name: Pack Tool
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pack NuGet tool
        run: dotnet pack ./src/MemShack.Cli/MemShack.Cli.csproj --configuration Release

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memshack-tool-package
          path: ./src/MemShack.Cli/nuget/*.nupkg
          if-no-files-found: error

  smoke-tool:
    name: Tool Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: pack-tool
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download packaged tool
        uses: actions/download-artifact@v4
        with:
          name: memshack-tool-package
          path: ./src/MemShack.Cli/nuget

      - name: Make bash smoke script executable
        if: runner.os != 'Windows'
        run: chmod +x ./tools/test-tool-install.sh

      - name: Run Windows smoke install script
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/test-tool-install.ps1 -SkipPack

      - name: Run Unix smoke install script
        if: runner.os != 'Windows'
        run: ./tools/test-tool-install.sh --skip-pack

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tool-smoke-${{ matrix.os }}
          path: ./artifacts/tool-smoke
          if-no-files-found: warn
